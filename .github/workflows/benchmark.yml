name: Benchmark

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y g++-14

      - name: Configure & Build
        run: |
          cmake -B build -DRANDX_BUILD_BENCHMARK=ON \
            -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_CXX_STANDARD=23
          cmake --build build --target benchmark_gbench -j$(nproc)

      - name: Run Benchmark
        run: |
          ./build/benchmark_gbench \
            --benchmark_format=json \
            --benchmark_out=result.json \
            --benchmark_repetitions=5 \
            --benchmark_report_aggregates_only=true

      - name: Find Baseline Run
        id: baseline-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 查询 master 分支最近一次成功、且非当前 commit 的 Benchmark run，
          # 其上传的 benchmark-baseline artifact 作为本次对比基线
          RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/benchmark.yml/runs?branch=master&status=success&per_page=20" \
            --jq '.workflow_runs[] | select(.head_sha != "${{ github.sha }}") | .id' | head -n 1)
          echo "run-id=${RUN_ID:-}" >> "$GITHUB_OUTPUT"

      - name: Download Baseline
        if: steps.baseline-run.outputs.run-id != ''
        uses: actions/download-artifact@v4
        with:
          name: benchmark-baseline
          path: baseline
          run-id: ${{ steps.baseline-run.outputs.run-id }}
          github-token: ${{ github.token }}
        continue-on-error: true

      - name: Compare with Baseline
        if: hashFiles('baseline/result.json') != ''
        continue-on-error: true
        run: python3 tools/compare_benchmark.py result.json baseline/result.json --tolerance 0.15

      - name: Upload Current Result as Baseline
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: result.json
          retention-days: 30
